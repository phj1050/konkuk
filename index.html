<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>건국대 도서관 · 원격 확정·연장</title>
  <style>
    :root {
      --surface: #1a222d;
      --border: #2d3a4a;
      --text: #e8eef4;
      --muted: #8b9cb0;
      --accent: #3d8bfd;
      --accent-dim: #2a6fd6;
      --danger: #f07178;
      --ok: #7fd99a;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      background: linear-gradient(165deg, #121820 0%, #0a0e12 100%);
      color: var(--text);
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    header { text-align: center; padding: 12px 0 18px; }
    header h1 { margin: 0 0 6px; font-size: 1.25rem; font-weight: 700; }
    header p { margin: 0; font-size: 0.8rem; color: var(--muted); line-height: 1.4; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #121920;
      color: var(--text);
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 139, 253, 0.25);
    }
    textarea {
      width: 100%;
      min-height: 72px;
      padding: 10px 12px;
      font-size: 0.8rem;
      font-family: ui-monospace, monospace;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #121920;
      color: var(--text);
      resize: vertical;
    }
    .hint { margin-top: 5px; font-size: 0.65rem; color: var(--muted); line-height: 1.35; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .card h2 { margin: 0 0 12px; font-size: 0.9rem; font-weight: 700; color: #cbd5e1; }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    button.primary {
      color: #fff;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
    }
    button.secondary {
      color: #e8eef4;
      background: #2a3544;
      border: 1px solid var(--border);
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.4;
      word-break: break-word;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      color: var(--muted);
    }
    .status.ok { border-color: rgba(127, 217, 154, 0.4); color: var(--ok); }
    .status.err { border-color: rgba(240, 113, 120, 0.4); color: var(--danger); }
    .status strong {
      display: block;
      margin-bottom: 3px;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
    }

    footer { margin-top: 14px; text-align: center; font-size: 0.6rem; color: #4a5568; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>원격 확정 · 연장</h1>
      <p>예약은 앱에서 먼저 하세요. 로그인은 서버가 자동 처리합니다.</p>
    </header>

    <label for="apiBase">백엔드 주소</label>
    <input type="url" id="apiBase" placeholder="https://xxx.onrender.com 또는 http://127.0.0.1:5000" autocomplete="off" />
    <p class="hint">칸을 바꾼 뒤 다른 곳을 누르면 이 브라우저에 저장됩니다.</p>

    <div class="card">
      <h2>배정 확정</h2>
      <label for="roomId">열람실 번호</label>
      <input type="text" id="roomId" inputmode="numeric" placeholder="예: 1" autocomplete="off" />
      <button type="button" class="primary" id="btnConfirm">원격 확정</button>
      <div class="status" id="statusConfirm" aria-live="polite"><strong>결과</strong>대기 중</div>
    </div>

    <div class="card">
      <h2>연장</h2>
      <p class="hint" style="margin-bottom:8px;">서버에 연장 URL 설정 후 사용. JSON 은 Network 캡처 본문.</p>
      <label for="extendJson">본문 JSON (선택)</label>
      <textarea id="extendJson" spellcheck="false" placeholder='{} 또는 캡처한 JSON'></textarea>
      <label for="usageId">usage_id (URL에 필요 시)</label>
      <input type="text" id="usageId" inputmode="numeric" placeholder="숫자" autocomplete="off" />
      <button type="button" class="secondary" id="btnExtend">연장</button>
      <div class="status" id="statusExtend" aria-live="polite"><strong>결과</strong>대기 중</div>
    </div>

    <footer>/auto-confirm · /extend · /health</footer>
  </div>

  <script>
    (function () {
      const LS = "kkulib_api_base_v3";
      const def = "http://127.0.0.1:5000";
      const q = new URLSearchParams(location.search).get("api");
      const el = document.getElementById("apiBase");
      el.value = q || localStorage.getItem(LS) || def;
      el.addEventListener("change", function () {
        localStorage.setItem(LS, el.value.trim() || def);
      });

      function base() {
        return (el.value || def).trim().replace(/\/$/, "");
      }

      function setStatus(elId, text, variant) {
        const node = document.getElementById(elId);
        node.classList.remove("ok", "err");
        if (variant === "ok") node.classList.add("ok");
        if (variant === "err") node.classList.add("err");
        node.innerHTML = "<strong>결과</strong>" + String(text).replace(/\n/g, "<br />");
      }

      async function post(path, json) {
        const res = await fetch(base() + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(json),
        });
        let payload;
        try {
          payload = await res.json();
        } catch {
          payload = { success: false, message: "JSON 파싱 실패" };
        }
        return { res, payload };
      }

      document.getElementById("btnConfirm").addEventListener("click", async function () {
        const room = document.getElementById("roomId").value.trim();
        if (!room) {
          alert("열람실 번호를 입력하세요.");
          return;
        }
        this.disabled = true;
        setStatus("statusConfirm", "로그인 후 요청 중…", null);
        try {
          const { payload } = await post("/auto-confirm", { room_id: room });
          const ok = payload.success === true;
          const msg = payload.message != null ? String(payload.message) : JSON.stringify(payload, null, 2);
          const code = payload.status_code != null ? "HTTP " + payload.status_code : "";
          const line = (ok ? "성공 " : "실패 ") + code + "\n" + msg;
          setStatus("statusConfirm", line, ok ? "ok" : "err");
          alert(line);
        } catch (e) {
          const t = "네트워크 오류: " + (e && e.message ? e.message : String(e));
          setStatus("statusConfirm", t, "err");
          alert(t);
        } finally {
          this.disabled = false;
        }
      });

      document.getElementById("btnExtend").addEventListener("click", async function () {
        this.disabled = true;
        setStatus("statusExtend", "로그인 후 요청 중…", null);
        try {
          let body = {};
          const raw = document.getElementById("extendJson").value.trim();
          if (raw) body = JSON.parse(raw);
          const uid = document.getElementById("usageId").value.trim();
          if (uid && body.usage_id === undefined) body.usage_id = uid;
          const { payload } = await post("/extend", body);
          const ok = payload.success === true;
          const msg = payload.message != null ? String(payload.message) : JSON.stringify(payload, null, 2);
          const code = payload.status_code != null ? "HTTP " + payload.status_code : "";
          const line = (ok ? "성공 " : "실패 ") + code + "\n" + msg;
          setStatus("statusExtend", line, ok ? "ok" : "err");
          alert(line);
        } catch (e) {
          if (e instanceof SyntaxError) {
            setStatus("statusExtend", "JSON 오류: " + e.message, "err");
            alert("연장 JSON 을 확인하세요.");
          } else {
            const t = "네트워크 오류: " + (e && e.message ? e.message : String(e));
            setStatus("statusExtend", t, "err");
            alert(t);
          }
        } finally {
          this.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
